<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{REPORT_TITLE}}</title>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --success: #3fb950;
    --warning: #d29922;
    --danger: #f85149;
    --info: #79c0ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem;
  }
  .container { max-width: 960px; margin: 0 auto; }
  h1 { font-size: 1.75rem; margin-bottom: 0.5rem; color: var(--accent); }
  h2 { font-size: 1.25rem; margin: 1.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
  h3 { font-size: 1.1rem; margin: 1rem 0 0.5rem; }
  .meta { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
  .badge { display: inline-block; padding: 0.15em 0.5em; font-size: 0.75rem; font-weight: 600; border-radius: 2em; }
  .badge-high { background: var(--danger); color: #fff; }
  .badge-medium { background: var(--warning); color: #000; }
  .badge-low { background: var(--info); color: #000; }
  .badge-ok { background: var(--success); color: #fff; }
  table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border: 1px solid var(--border); }
  th { background: var(--card); font-weight: 600; }
  td { background: var(--bg); }
  code { font-family: 'SF Mono', 'Fira Code', monospace; background: var(--card); padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.875em; }
  pre { background: var(--card); padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.75rem 0; }
  ul, ol { margin: 0.5rem 0 0.5rem 1.5rem; }
  li { margin: 0.25rem 0; }
  .summary { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin: 1rem 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>{{REPORT_TITLE}}</h1>
  <p class="meta">{{CONTEXT_LINE}} | Generated: {{GENERATED_AT}}</p>

  <nav class="summary">
    <strong>目次</strong>
    {{TOC_ITEMS}}
  </nav>

  {{MAIN_CONTENT}}
</div>
</body>
</html>
